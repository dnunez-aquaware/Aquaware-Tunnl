version: 3

automerge: false
parallel_plan: true
parallel_apply: true
delete_source_branch_on_merge: false

projects:
  - name: terraform-demo
    dir: ../stack/terraform
    terraform_version: v1.13.0

    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - ".terraform.lock.hcl"

    apply_requirements:
      - approved
      - mergeable

    workflow: terraform-workflow

workflows:
  terraform-workflow:
    plan:
      steps:
        - init
        - fmt
        - validate
        - plan

    apply:
      steps:
        - apply