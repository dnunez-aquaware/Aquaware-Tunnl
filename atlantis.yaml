version: 3

automerge: false
parallel_plan: true
parallel_apply: true
delete_source_branch_on_merge: false

projects:
  - name: terraform-demo

    dir: Day02/code/stack/terraform
    #version especifica del proyecto terraform-demo
    terraform_version: v1.13.0
    #Este es el que llama al " plan: " dentro del terraform-workflow:
    autoplan:
      enabled: true
      when_modified:
        - "**/*.tf"
        - "**/*.tfvars"
        - "**/.terraform.lock.hcl"
    apply_requirements:
      - mergeable
    #workflow que ejecutara atlantis, se ubica abajo
    workflow: terraform-workflow

workflows:
  terraform-workflow:
    #workflow equivalente a jobs
    #compara es la rama base main con la rama head test-atlantis en la que estoy si detecta un cambio en alguno de esos archivos *.tf ejecuta el plan:
    plan:
      steps:
        - run: aws sts get-caller-identity

        - init:
            extra_args:
              - "-backend-config=../../bootstrap/backend.hcl"

        - run: terraform fmt -check

        - run: terraform validate

        - plan
        
        - run: |
            /home/atlantis/.atlantis/bin/terraform1.13.0 show -json $PLANFILE > tfplan.json
            conftest test tfplan.json --policy ../../policies/opa
    apply:
      steps:
        - apply