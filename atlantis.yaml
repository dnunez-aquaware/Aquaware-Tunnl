version: 3

automerge: false
parallel_plan: true
parallel_apply: true
delete_source_branch_on_merge: false

projects:
  - name: terraform-demo

    dir: Day02/code/stack/terraform

    terraform_version: v1.13.0

    autoplan:
      enabled: true
      when_modified:
        - "**/*.tf"
        - "**/*.tfvars"
        - "**/.terraform.lock.hcl"

    # Bloqueamos el apply a nivel de proyecto: exige una aprobación
    # imposible de satisfacer automáticamente por este equipo, dejando
    # el workflow como "solo plan" en la práctica.
    apply_requirements:
      - approved
      - mergeable

    workflow: terraform-workflow

workflows:
  terraform-workflow:

    plan:
      steps:
        - run: aws sts get-caller-identity

        - init:
            extra_args:
              - "-backend-config=../../bootstrap/backend.hcl"

        - fmt

        - validate

        - plan

        - run: |
            VERSION=$(curl -s https://api.github.com/repos/open-policy-agent/conftest/releases/latest | jq -r .tag_name)
            curl -L -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/${VERSION}/conftest_${VERSION#v}_Linux_x86_64.tar.gz
            tar -xzf conftest.tar.gz
            sudo mv conftest /usr/local/bin/
            terraform show -json $PLANFILE > tfplan.json
            conftest test tfplan.json --policy ../../policies/opa

    # Apply deshabilitado intencionalmente: sin steps, cualquier intento
    # de "atlantis apply" no ejecutará nada.
    apply:
      steps: []