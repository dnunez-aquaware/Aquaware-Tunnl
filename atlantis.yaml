version: 3

automerge: false
parallel_plan: true
parallel_apply: true
delete_source_branch_on_merge: false

projects:
  - name: terraform-demo

    dir: Day02/code/stack/terraform

    terraform_version: v1.13.0

    autoplan:
      enabled: true
      when_modified:
        - "**/*.tf"
        - "**/*.tfvars"
        - "**/.terraform.lock.hcl"

    # Bloqueamos el apply a nivel de proyecto: exige una aprobación
    # imposible de satisfacer automáticamente por este equipo, dejando
    # el workflow como "solo plan" en la práctica.
    apply_requirements:
      - approved
      - mergeable

    workflow: terraform-workflow

workflows:
  terraform-workflow:

    plan:
      steps:
        - run: aws sts get-caller-identity

        - init:
            extra_args:
              - "-backend-config=../../bootstrap/backend.hcl"

        - run: terraform fmt -check

        - run: terraform validate

        - plan

        - run: |
            /home/atlantis/.atlantis/bin/terraform1.13.0 show -json $PLANFILE > tfplan.json
            conftest test tfplan.json --policy ../../policies/opa

    # Apply deshabilitado intencionalmente: sin steps, cualquier intento
    # de "atlantis apply" no ejecutará nada.
    apply:
      steps: []